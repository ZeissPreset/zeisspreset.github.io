<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itemku - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container" id="authContainer">
        <!-- Login Form -->
        <div class="login-container">
            <div class="logo">
                <i class="fas fa-store"></i>
            </div>
            <h1>Welcome to Itemku</h1>
            <p class="subtitle">Please login to access your dashboard</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    <div class="message error-message" id="loginErrorMessage"></div>
                </div>
                
                <button type="submit" class="auth-btn" id="loginBtn">
                    <span>Login</span>
                    <div class="spinner"></div>
                </button>
            </form>
            
            <div class="switch-form">
                Don't have an account? <a href="#" id="showRegister">Register</a>
            </div>
        </div>

        <!-- Register Form -->
        <div class="register-container">
            <div class="logo">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1>Create Account</h1>
            <p class="subtitle">Join our platform today</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" placeholder="Choose a username" required minlength="4">
                </div>
                
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password" required minlength="6">
                    <i class="fas fa-eye password-toggle" id="toggleRegPassword"></i>
                    <div class="password-strength">
                        <div class="password-strength-fill" id="passwordStrength"></div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="regConfirmPassword">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                    <i class="fas fa-eye password-toggle" id="toggleRegConfirmPassword"></i>
                    <div class="message error-message" id="regErrorMessage"></div>
                    <div class="message success-message" id="regSuccessMessage"></div>
                </div>
                
                <button type="submit" class="auth-btn" id="registerBtn">
                    <span>Register</span>
                    <div class="spinner"></div>
                </button>
            </form>
            
            <div class="switch-form">
                Already have an account? <a href="#" id="showLogin">Login</a>
            </div>
        </div>
    </div>

    <script src="user.js"></script>
    <script src="premium.js"></script>
    <script src="auth.js"></script>
</body>
</html>
